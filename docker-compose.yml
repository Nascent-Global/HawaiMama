services:
  postgres:
    image: postgres:16
    container_name: hawaimama-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hawaimama}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hawaimama_dev}
      POSTGRES_DB: ${POSTGRES_DB:-hawaimama}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hawaimama} -d ${POSTGRES_DB:-hawaimama}"]
      interval: 10s
      timeout: 5s
      retries: 5

  core:
    build:
      context: ./core
    container_name: hawaimama-core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TRAFFIC_MONITORING_DATABASE_URL: ${TRAFFIC_MONITORING_DATABASE_URL:-postgresql://hawaimama:hawaimama_dev@postgres:5432/hawaimama}
      ADMIN_ALLOWED_ORIGINS: ${ADMIN_ALLOWED_ORIGINS:-http://localhost:3000}
      USE_S3: ${USE_S3:-false}
      LOCAL_OBJECT_STORAGE_ROOT: ${LOCAL_OBJECT_STORAGE_ROOT:-./wwwroots}
      LOCAL_OBJECT_STORAGE_URL_PREFIX: ${LOCAL_OBJECT_STORAGE_URL_PREFIX:-/wwwroots}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_PREFIX: ${S3_PREFIX:-traffic-monitoring}
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-superadmin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-superadmin123}
      SUPERADMIN_FULL_NAME: ${SUPERADMIN_FULL_NAME:-System Superadmin}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
      DEFAULT_ADMIN_FULL_NAME: ${DEFAULT_ADMIN_FULL_NAME:-Default Office Admin}
    ports:
      - "8000:8000"
    volumes:
      - ./core/models:/app/models:ro
      - ./core/yolov8n.pt:/app/yolov8n.pt:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/auth/me').status in (200,401) else 1)\""]
      interval: 20s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: ./admin
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: hawaimama-admin
    restart: unless-stopped
    depends_on:
      core:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  pgdata:
